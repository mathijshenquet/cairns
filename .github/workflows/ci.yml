name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: Test
    if: github.event_name != 'push' || !contains(github.event.head_commit.message, '[skip ci]')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Sync dev environment
        run: uv sync --extra dev

      - name: Lint imports
        run: uv run lint-imports

      - name: Type-check (pyright)
        # Run inside the synced project venv so pyright resolves pydantic etc.
        run: uv run --with pyright pyright

      - name: Tests
        run: uv run pytest

      - name: Build artifacts
        run: uv build

      - name: twine check
        run: uvx twine check dist/*

      - name: Upload built artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ github.sha }}
          path: dist/
          retention-days: 7

  prepare-release:
    name: Prepare release
    if: |
      github.event_name == 'push'
      && github.ref == 'refs/heads/main'
      && vars.AUTO_RELEASE != 'false'
      && github.event.head_commit.author.email != '41898282+github-actions[bot]@users.noreply.github.com'
      && !contains(github.event.head_commit.message, '[no release]')
      && !contains(github.event.head_commit.message, '[skip ci]')
    needs: [test]
    runs-on: ubuntu-latest
    concurrency:
      group: cairns-release-main
      cancel-in-progress: false
    permissions:
      contents: write
      actions: write   # to dispatch release.yml after tagging

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Compute next version
        id: version
        run: |
          version="$(uv run scripts/release_version.py print-next --level patch)"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "tag=v${version}" >> "$GITHUB_OUTPUT"

      - name: Skip if tag already exists
        id: skip
        run: |
          if git ls-remote --exit-code --tags origin "refs/tags/${{ steps.version.outputs.tag }}" >/dev/null 2>&1; then
            echo "Tag ${{ steps.version.outputs.tag }} already exists; nothing to do."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Apply version
        if: steps.skip.outputs.skip != 'true'
        run: |
          uv run scripts/release_version.py set "${{ steps.version.outputs.version }}"
          uv lock

      - name: Commit, tag, and push
        if: steps.skip.outputs.skip != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if ! git diff --quiet -- pyproject.toml uv.lock; then
            git add pyproject.toml uv.lock
            git commit -m "Release ${{ steps.version.outputs.tag }} [skip ci]"
            git push origin HEAD:main
          fi
          git tag "${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"

      - name: Trigger publish for new tag
        if: steps.skip.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run release.yml --ref "${{ steps.version.outputs.tag }}" -f tag="${{ steps.version.outputs.tag }}"
